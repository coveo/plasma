name: CI

on:
    pull_request:
        types: [opened, reopened, synchronize]

env:
    TURBO_TOKEN: '${{ secrets.TURBO_TOKEN }}'

jobs:
    release-preview:
        name: Release Preview
        if: ${{ !startsWith(github.head_ref , 'changeset-release/') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup
            - name: Generate release preview
              id: preview
              shell: bash
              run: |
                  {
                    echo "message<<EOF"
                    pnpm exec node scripts/releasePreview.js | tee -a "$GITHUB_STEP_SUMMARY"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"
            - name: Comment release preview on the PR
              if: github.event.pull_request.head.repo.full_name == github.repository
              uses: ./.github/actions/comment-on-pr
              with:
                  message: ${{ steps.preview.outputs.message }}
                  avoidRepostsWith: '<!-- changesets-release-preview -->'
                  updateExisting: 'true'
    lint:
        name: Lint Changed Files
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup
            - uses: ./.github/actions/build
            - name: Lint
              run: pnpm lint
              env:
                  # Without this, oxlint fails with a cryptic error (Error: Invalid tsconfig)
                  OXLINT_TSGOLINT_DANGEROUSLY_SUPPRESS_PROGRAM_DIAGNOSTICS: true
            - name: Check format
              run: pnpm fmt:check
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: ./.github/actions/setup
            - uses: ./.github/actions/test
    demo:
        name: Build & Deploy Demo
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0
            - uses: ./.github/actions/setup
            - name: Compute Chromatic URL
              id: chromatic-url
              shell: bash
              run: |
                  BRANCH="${{ github.head_ref || github.ref_name }}"
                  CLEAN_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
                  echo "url=https://${CLEAN_BRANCH}--69e1126f9e24a5e560359ac2.chromatic.com" >> "$GITHUB_OUTPUT"
            - uses: ./.github/actions/build
              env:
                  PLASMA_BASE_URL: ${{ steps.chromatic-url.outputs.url }}
            - name: Copy LLM files into Storybook output
              run: cp -r ./packages/llms/dist/. ./packages/storybook/storybook-static/
            - name: Deploy Storybook to Chromatic
              env:
                  CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
              run: pnpm --filter storybook run chromatic --storybookBuildDir storybook-static --ci
            - name: Add demo link as a comment on the PR
              uses: ./.github/actions/comment-on-pr
              with:
                  message: 'Live demo of your latest successful build available here:\n- [:books: Storybook](${{ steps.chromatic-url.outputs.url }}/).'
                  avoidRepostsWith: Live demo of your latest successful build available here
