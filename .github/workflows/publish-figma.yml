name: Publish Figma Components
on:
    push:
        paths:
            - '**/*.figma.tsx'
        branches:
            - master

permissions:
    contents: read

jobs:
    code-connect-publish:
        name: Code Connect Publish
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
            - uses: ./.github/actions/setup
            - name: Harden Runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit
            - name: Publish changes to Figma
              run: pnpm figma:publish
              working-directory: packages/figma
              env:
                  FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_TOKEN }}
