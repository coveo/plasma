name: CD

on: workflow_dispatch

concurrency:
    group: ${{ github.ref_name }}
    cancel-in-progress: true

env:
    TURBO_TOKEN: '${{ secrets.TURBO_TOKEN }}'

permissions:
    pull-requests: write
    id-token: write
    actions: read
    contents: write
    security-events: write
    statuses: write

jobs:
    cd:
        name: Continuous Delivery
        if: github.ref_name == 'master' || github.ref_name == 'next'
        runs-on: ubuntu-latest
        environment: production
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
            - name: Setup
              uses: ./.github/actions/setup
            - name: Lint
              uses: ./.github/actions/lint
              with:
                  WORKFLOW: 'cd'
            - name: Build
              uses: ./.github/actions/build
            - name: Test
              uses: ./.github/actions/test
            - name: Publish stable releases
              if: github.ref_name == 'master'
              run: pnpm release:publish
            - name: Configure git for prerelease commits
              if: github.ref_name == 'next'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            - name: Bootstrap prerelease mode for next
              if: github.ref_name == 'next' && !hashFiles('.changeset/pre.json')
              run: pnpm release:pre:enter:next
            - name: Version prereleases on next
              if: github.ref_name == 'next'
              run: pnpm changeset:version
            - name: Commit prerelease version updates
              if: github.ref_name == 'next'
              shell: bash
              run: |
                  if git diff --quiet -- .changeset package.json packages; then
                    echo "No prerelease version changes to commit"
                    exit 0
                  fi

                  git add .changeset package.json packages
                  git commit -m "chore(release): version packages [skip ci]"
                  git push origin HEAD:next
            - name: Publish prereleases
              if: github.ref_name == 'next'
              run: pnpm release:pre:publish:next
            - name: Deploy
              uses: ./.github/actions/deploy
              # Demo for next branch is deployed by the CI workflow
              if: github.ref != 'refs/heads/next'
              with:
                  AWS_ROLE: ${{ secrets.AWS_ROLE }}
                  AWS_REGION: ${{ secrets.AWS_REGION }}
                  AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
            - name: Deploy Storybook to Chromatic
              env:
                  CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
              run: pnpm --filter storybook run chromatic --storybookBuildDir storybook-static --ci --exit-zero-on-changes --auto-accept-changes --branchName=${{ github.ref_name }}
