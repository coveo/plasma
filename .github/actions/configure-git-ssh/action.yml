name: Configure Git SSH
description: Configure git user and SSH remote for pushing to protected branches
inputs:
    deploy-key:
        description: SSH deploy key for push access
        required: true
runs:
    using: composite
    steps:
        - name: Configure git user and SSH remote
          shell: bash
          env:
              DEPLOY_KEY: ${{ inputs.deploy-key }}
          run: |
              git config user.name "coveobot"
              git config user.email "coveobot@coveo.com"
              eval "$(ssh-agent -s)"
              echo "$DEPLOY_KEY" | ssh-add -
              echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
              echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
              git remote add deploy git@github.com:${{ github.repository }}.git
