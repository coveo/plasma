packages:
  - 'packages/*'
allowBuilds:
  aws-sdk: false
  core-js-pure: false
  esbuild: false
  unrs-resolver: false
minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - '@mantine/*'
  # Renovate security update: turbo@2.9.14
  - turbo@2.9.14
  # Renovate security update: vite@8.0.16
  - vite@8.0.16
peerDependencyRules:
  ignoreMissing:
    - react-native
overrides:
  '@babel/traverse': ^8.0.0
  nwsapi: 2.2.24
strictPeerDependencies: false
saveExact: true
autoInstallPeers: false
patchedDependencies:
  '@mantine/form@8.3.18': patches/@mantine__form@8.3.18.patch
  '@monaco-editor/react@4.7.0': patches/@monaco-editor__react@4.7.0.patch
