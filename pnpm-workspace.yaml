packages:
    - 'packages/*'
allowBuilds:
    '@swc/core': false
    aws-sdk: false
    core-js-pure: false
    esbuild: false
    unrs-resolver: false
minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
    - '@mantine/*'
peerDependencyRules:
    ignoreMissing:
        - react-native
overrides:
    '@babel/traverse': ^7.23.2
    nwsapi: 2.2.23
strictPeerDependencies: false
saveExact: true
autoInstallPeers: false
